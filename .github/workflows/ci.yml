name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      # CI builds resolve Tamp.Core from nuget.org (the published 1.0.x),
      # NOT the sibling-clone ProjectReference. Matches what release.yml
      # does so test-time and pack-time wire to the same Tamp.Core binary.
      TampCoreMode: package
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_BUILD_LABEL: tamp-graphql-codegen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # graphql-code-generator is a Node CLI; the integration tests
      # exercise it against a tiny fixture schema. setup-node ships npm
      # which we use to install the CLI globally.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Plugins (typescript, typescript-operations) are *not* bundled
      # with @graphql-codegen/cli — they're separate packages. The
      # integration test fixture resolves them via NODE_PATH falling
      # back to global node_modules, so we install them here too.
      - name: Install graphql-code-generator
        run: |
          npm install -g @graphql-codegen/cli@5.0.4 graphql@16.9.0 @graphql-codegen/typescript@4 @graphql-codegen/typescript-operations@4
          graphql-codegen --help | head -5

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Verify SDKs
        shell: bash
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Tamp.GraphQLCodegen.slnx

      - name: Build
        run: dotnet build Tamp.GraphQLCodegen.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Tamp.GraphQLCodegen.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/**/*.trx
          if-no-files-found: warn
